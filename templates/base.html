{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>DairyFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
    href="{% static 'css/style.css' %}">

</head>

<body>

    <!-- Navbar અહીં મૂકો -->    <!-- navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow py-2">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="{% static 'images/logo.jpeg' %}" width="70" class="me-2">
            <span class="fw-bold fs-3">DairyFlow</span>
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link " href="{% url 'home' %}">
                        <i class="bi bi-house-door-fill"></i> Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'admin_login' %}">
                        <i class="bi bi-person-gear"></i> Admin
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'customer_login' %}">
                        <i class="bi bi-person-circle"></i> Customer
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-telephone-fill"></i> Contact
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-info-circle-fill"></i> About
                    </a>
                </li>

            </ul>

        </div>

    </div>
</nav>



    {% block content %}

    {% endblock %}



    <!-- Footer અહીં મૂકો -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- Footer -->

    <footer class="bg-success text-white mt-5">

    <div class="container py-5">

        <div class="row">

            <!-- Contact -->

            <div class="col-md-4">

                <h4>Contact</h4>

                <p>
                    <i class="bi bi-telephone-fill"></i>
                    +91 9876543210
                </p>

                <p>
                    <i class="bi bi-envelope-fill"></i>
                    info@dairyflow.com
                </p>

            </div>

            <!-- Address -->

            <div class="col-md-4">

                <h4>Address</h4>

                <p>

                    <i class="bi bi-geo-alt-fill"></i>

                    Ahmedabad,
                    Gujarat,
                    India

                </p>

            </div>

            <!-- Social -->

            <div class="col-md-4">

                <h4>Follow Us</h4>

                <i class="bi bi-facebook fs-3 me-3"></i>

                <i class="bi bi-instagram fs-3 me-3"></i>

                <i class="bi bi-youtube fs-3"></i>

            </div>

        </div>

        <hr>

        <p class="text-center mb-0">

            © 2026 DairyFlow

            | All Rights Reserved

        </p>

    </div>

</footer>
</body>

</html>
